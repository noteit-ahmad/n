<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NFC Loyalty</title>
</head>
<body style="font-family:Arial;text-align:center;padding:30px">

<h2>Customer Card</h2>

<p id="name">Loading...</p>
<p>Points: <span id="points">0</span></p>

<button onclick="addPoint()">+ Add Point</button>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

// ضع رابط الـ Apps Script هون
const API = "https://script.google.com/macros/s/AKfycbwy1oUq7J1ADwcDyt0vkB1XjhiScn2ZrlX8aCcuYwzKhywrsGbSKpUdyWdbpQRx1eg1/exec";

let currentPoints = 0;

fetch(`${API}?id=${id}`)
.then(res => res.json())
.then(data => {
  document.getElementById("name").innerText = data.name;
  document.getElementById("points").innerText = data.points;
  currentPoints = data.points;
});

function addPoint(){
  currentPoints++;

  fetch(API + "?action=add&id=" + id + "&points=" + currentPoints)
  .then(() => location.reload());
}
</script>

</body>
</html>
